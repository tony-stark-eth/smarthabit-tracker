# GlitchTip — self-hosted error tracking (Sentry-compatible)
# Usage: docker compose -f compose.glitchtip.yaml up -d

services:
  glitchtip:
    image: glitchtip/glitchtip:latest
    environment:
      DATABASE_URL: postgresql://glitchtip:glitchtip@glitchtip-db:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-in-production}
      PORT: "8000"
      EMAIL_URL: ${EMAIL_URL:-consolemail://}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-https://errors.smarthabit.de}
      DEFAULT_FROM_EMAIL: noreply@smarthabit.de
      CELERY_WORKER_AUTOSCALE: "1,3"
      ENABLE_OBSERVABILITY_API: "true"
    ports:
      - "8000:8000"
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-redis:
        condition: service_started
    restart: unless-stopped

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgresql://glitchtip:glitchtip@glitchtip-db:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-in-production}
      EMAIL_URL: ${EMAIL_URL:-consolemail://}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-https://errors.smarthabit.de}
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-redis:
        condition: service_started
    restart: unless-stopped

  glitchtip-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: glitchtip
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "glitchtip"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  glitchtip-redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  glitchtip_db:
