# GlitchTip — self-hosted error tracking (Sentry-compatible)
#
# Usage: docker compose -f compose.glitchtip.yaml up -d
# UI:    http://<server-ip>:8000
#
# After first start:
# 1. Open the UI and create an account
# 2. Create an organization + project (type: Symfony)
# 3. Copy the DSN → set as SENTRY_DSN in .env.local
#
# Requires .env with GLITCHTIP_SECRET_KEY (generate: openssl rand -hex 32)

services:
  glitchtip:
    image: glitchtip/glitchtip:latest
    environment:
      DATABASE_URL: postgresql://glitchtip:${GLITCHTIP_DB_PASSWORD:-glitchtip}@glitchtip-db:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-in-production}
      PORT: "8000"
      EMAIL_URL: ${EMAIL_URL:-consolemail://}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8000}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_FROM_EMAIL:-noreply@example.com}
      CELERY_WORKER_AUTOSCALE: "1,3"
      ENABLE_OBSERVABILITY_API: "true"
      CACHE_URL: redis://glitchtip-redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-redis:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgresql://glitchtip:${GLITCHTIP_DB_PASSWORD:-glitchtip}@glitchtip-db:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-in-production}
      EMAIL_URL: ${EMAIL_URL:-consolemail://}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8000}
      CACHE_URL: redis://glitchtip-redis:6379/0
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-redis:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  glitchtip-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD:-glitchtip}
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "glitchtip"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  glitchtip-redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  glitchtip_db:
