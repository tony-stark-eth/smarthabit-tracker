# compose.prod.yaml — Production overrides
#
# Usage:
#   docker compose -f compose.yaml -f compose.prod.yaml up -d
#
# Requires .env.local with: DATABASE_URL, APP_SECRET, MERCURE_JWT_SECRET,
# JWT_PASSPHRASE, SERVER_NAME, POSTGRES_PASSWORD, MAILER_DSN, etc.

services:
  php:
    image: app-php:prod
    build:
      target: frankenphp_prod
    env_file:
      - .env.local
    environment:
      - APP_ENV=prod
      - APP_DEBUG=0
      - FRANKENPHP_CONFIG=worker ./public/index.php
      # Override dev DATABASE_URL from compose.yaml
      - DATABASE_URL=postgresql://app:${POSTGRES_PASSWORD:-!ChangeMe!}@pgbouncer:5432/app?serverVersion=17&sslmode=disable&charset=utf8
      - MERCURE_URL=https://php/.well-known/mercure
      - MERCURE_PUBLIC_URL=/.well-known/mercure
      - DEPLOY_SHA=${DEPLOY_SHA:-dev}
      # OpenTelemetry — MUST be in compose environment (not .env), see P1 pitfall
      - OTEL_PHP_AUTOLOAD_ENABLED=true
      - OTEL_SERVICE_NAME=smart-habit-api
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://openobserve:5080
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_PROPAGATORS=tracecontext,baggage
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic ${O2_AUTH_TOKEN:-}
    restart: unless-stopped
    # Override dev bind mounts, use only Caddy TLS/config + JWT keys + Caddyfile
    volumes: !override
      - caddy_data:/data
      - caddy_config:/config
      - ./backend/config/jwt:/app/config/jwt:ro
      - ./docker/frankenphp/Caddyfile:/etc/caddy/Caddyfile:ro
      - /var/log/caddy:/var/log/caddy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  database:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
    volumes:
      - /mnt/data/postgres:/var/lib/postgresql/data

  pgbouncer:
    environment:
      DB_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}

  messenger-worker:
    image: app-php:prod
    build:
      target: frankenphp_prod
    env_file:
      - .env.local
    # Override dev bind mounts — prod uses image-baked code
    volumes: !override []
    environment:
      - APP_ENV=prod
      - APP_DEBUG=0
      # Messenger worker connects directly to Postgres (LISTEN/NOTIFY)
      - DATABASE_URL=postgresql://app:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/app?serverVersion=17&sslmode=disable&charset=utf8
    # Worker doesn't serve HTTP — disable inherited health check
    healthcheck:
      disable: true
    restart: unless-stopped

  # Mailpit is dev-only — prod uses Resend SMTP via MAILER_DSN in .env.local
  mailpit:
    deploy:
      replicas: 0

  ntfy:
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # OpenObserve — unified observability (logs, traces, metrics)
  # UI accessible via SSH tunnel: ssh -L 5080:localhost:5080 root@server
  # Browser SDK telemetry routed through Caddy at /o2/*
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    environment:
      ZO_ROOT_USER_EMAIL: ${O2_ROOT_EMAIL:-admin@example.com}
      ZO_ROOT_USER_PASSWORD: ${O2_ROOT_PASSWORD:-}
      ZO_DATA_DIR: /data
      # Memory tuning for CX23 (4 GB shared with app)
      ZO_MEM_TABLE_MAX_SIZE: "64"
      ZO_MEMORY_CACHE_MAX_SIZE: "128"
      ZO_MEMORY_CACHE_DATAFUSION_MAX_SIZE: "128"
      ZO_COMPACT_DATA_RETENTION_DAYS: "90"
      # SMTP for alerting (reuses Resend credentials)
      ZO_SMTP_ENABLED: ${ZO_SMTP_ENABLED:-false}
      ZO_SMTP_HOST: ${ZO_SMTP_HOST:-}
      ZO_SMTP_PORT: ${ZO_SMTP_PORT:-465}
      ZO_SMTP_USER_NAME: ${ZO_SMTP_USER_NAME:-}
      ZO_SMTP_PASSWORD: ${ZO_SMTP_PASSWORD:-}
      ZO_SMTP_FROM_EMAIL: ${ZO_SMTP_FROM_EMAIL:-}
    volumes:
      - /mnt/data/openobserve:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
