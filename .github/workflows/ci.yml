name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker/**'
      - 'compose*.yaml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker/**'
      - 'compose*.yaml'
      - '.github/workflows/ci.yml'

# All jobs run inside the same Docker image as local dev (FrankenPHP).
# Jobs run in parallel — a failure in one does not block others, so you
# see ALL issues at once instead of fixing them one by one.

jobs:
  # ── Static analysis (no DB required) ──────────────────────────────────
  ecs:
    name: ECS
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frankenphp/Dockerfile
          target: frankenphp_dev
          load: true
          tags: app-php:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-
      - name: Composer install
        run: |
          docker compose run --rm --no-deps --entrypoint composer \
            -e COMPOSER_CACHE_DIR=/tmp/composer-cache \
            -v "$HOME/.composer/cache:/tmp/composer-cache" \
            php install --no-interaction --prefer-dist --no-scripts
      - name: ECS Check
        run: docker compose run --rm --no-deps --entrypoint "" php vendor/bin/ecs check

  phpstan:
    name: PHPStan
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frankenphp/Dockerfile
          target: frankenphp_dev
          load: true
          tags: app-php:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-
      - name: Composer install
        run: |
          docker compose run --rm --no-deps --entrypoint composer \
            -e COMPOSER_CACHE_DIR=/tmp/composer-cache \
            -v "$HOME/.composer/cache:/tmp/composer-cache" \
            php install --no-interaction --prefer-dist --no-scripts
      - name: Warm Symfony cache (generates container XML for PHPStan)
        run: docker compose run --rm --no-deps --entrypoint "" php php bin/console cache:warmup
      - name: PHPStan
        run: docker compose run --rm --no-deps --entrypoint "" php vendor/bin/phpstan analyse --memory-limit=512M

  rector:
    name: Rector
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frankenphp/Dockerfile
          target: frankenphp_dev
          load: true
          tags: app-php:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-
      - name: Composer install
        run: |
          docker compose run --rm --no-deps --entrypoint composer \
            -e COMPOSER_CACHE_DIR=/tmp/composer-cache \
            -v "$HOME/.composer/cache:/tmp/composer-cache" \
            php install --no-interaction --prefer-dist --no-scripts
      - name: Rector dry-run
        run: docker compose run --rm --no-deps --entrypoint "" php vendor/bin/rector process --dry-run

  # ── Tests (requires DB) ───────────────────────────────────────────────
  tests:
    name: Tests + Infection
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frankenphp/Dockerfile
          target: frankenphp_dev
          load: true
          tags: app-php:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-
      - name: Composer install
        run: |
          docker compose run --rm --no-deps --entrypoint composer \
            -e COMPOSER_CACHE_DIR=/tmp/composer-cache \
            -v "$HOME/.composer/cache:/tmp/composer-cache" \
            php install --no-interaction --prefer-dist --no-scripts
      - name: Start services (database + pgbouncer + php)
        run: docker compose up -d --no-build database pgbouncer php
      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T database pg_isready -U app && break
            sleep 2
          done

      # Tests bypass PgBouncer — transaction mode only proxies `app`, not `app_test`.
      # phpunit.xml.dist enforces DATABASE_URL=database:5432/app via force="true".
      - name: Migrate test database
        run: |
          docker compose exec -T \
            -e APP_ENV=test \
            -e DATABASE_URL="postgresql://app:!ChangeMe!@database:5432/app?serverVersion=17&sslmode=disable" \
            php php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

      # XDEBUG_MODE=coverage: PCOV is not available (FrankenPHP uses ZTS PHP).
      - name: PHPUnit (Unit + Integration)
        run: |
          docker compose exec -T \
            -e APP_ENV=test \
            -e XDEBUG_MODE=coverage \
            php vendor/bin/phpunit \
              --coverage-clover=var/coverage/clover.xml \
              --coverage-xml=var/coverage/coverage-xml \
              --log-junit=var/coverage/junit.xml

      - name: Infection (mutation testing)
        run: |
          set +e
          OUTPUT=$(docker compose exec -T \
            -e APP_ENV=test \
            -e XDEBUG_MODE=coverage \
            php vendor/bin/infection \
              --threads=4 --coverage=var/coverage \
              --skip-initial-tests --min-msi=80 --min-covered-msi=90 \
              --ignore-msi-with-no-mutations 2>&1)
          EC=$?
          echo "$OUTPUT"
          if [ $EC -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "No source file found"; then
              echo "::notice::No mutable source files — Infection skipped (expected for fresh template)"
              exit 0
            fi
            exit $EC
          fi
