name: Deploy

on:
  push:
    branches: [main]

# Only one deployment at a time — never cancel in progress to avoid partial deploys
concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  checks: read
  contents: read
  packages: write

jobs:
  # ── Gate: wait for all CI checks to pass ─────────────────────────────────
  ci-check:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-regexp: '^(Backend|Frontend|Playwright)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  # ── Build production image and push to GHCR ──────────────────────────────
  build-and-push:
    name: Build & Push Image
    needs: ci-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frankenphp/Dockerfile
          target: frankenphp_prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/app:latest
            ghcr.io/${{ github.repository }}/app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to production via SSH ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/smarthabit

            # Pull latest image
            docker pull ghcr.io/${{ github.repository }}/app:${{ github.sha }}

            # Tag as current
            docker tag ghcr.io/${{ github.repository }}/app:${{ github.sha }} ghcr.io/${{ github.repository }}/app:current

            # Run migrations before switching traffic
            docker compose -f compose.yaml -f compose.prod.yaml run --rm \
              -e DATABASE_URL="${DATABASE_URL}" \
              php php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

            # Restart services with new image
            docker compose -f compose.yaml -f compose.prod.yaml up -d --no-build

            # Verify health
            sleep 10
            curl -sf http://localhost/api/v1/health || exit 1

            echo "Deployment complete: ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: echo "::error::Deployment failed for ${{ github.sha }}"
