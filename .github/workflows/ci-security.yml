name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infrastructure/**'
      - 'docker/**'
      - '.bearer.yml'
      - 'bearer.ignore'
      - '.semgrepignore'
      - '.github/workflows/ci-security.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infrastructure/**'
      - 'docker/**'
      - '.bearer.yml'
      - 'bearer.ignore'
      - '.semgrepignore'
      - '.github/workflows/ci-security.yml'

permissions:
  contents: read
  security-events: write

jobs:
  bearer:
    name: Bearer SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}

      - name: Install Bearer
        run: curl -sfL https://raw.githubusercontent.com/Bearer/bearer/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Bearer scan (full)
        if: github.event_name == 'push'
        run: bearer scan . --format sarif --output bearer-results.sarif --exit-code 0

      - name: Bearer scan (diff)
        if: github.event_name == 'pull_request'
        run: bearer scan . --diff --format sarif --output bearer-results.sarif --exit-code 0

      - name: Upload Bearer SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bearer-results.sarif
          category: bearer

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semgrep scan (full)
        if: github.event_name == 'push'
        run: semgrep scan --config auto --config p/secrets --sarif --output semgrep-results.sarif --no-error

      - name: Semgrep scan (diff)
        if: github.event_name == 'pull_request'
        env:
          SEMGREP_BASELINE_REF: ${{ github.event.pull_request.base.sha }}
        run: semgrep scan --config auto --config p/secrets --sarif --output semgrep-results.sarif --no-error --baseline-commit $SEMGREP_BASELINE_REF

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  audit:
    name: Composer Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Composer audit
        run: composer audit --locked
