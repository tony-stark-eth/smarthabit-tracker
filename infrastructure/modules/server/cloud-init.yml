#cloud-config

# ── Pakete aktualisieren ──────────────────────────────────────────────────────
package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - unattended-upgrades
  - fail2ban

# ── Docker installieren ───────────────────────────────────────────────────────
runcmd:
  # Docker GPG key
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc

  # Docker Repository
  - |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list

  # Docker installieren
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # Start and enable Docker
  - systemctl enable docker
  - systemctl start docker

  # Mount volume to /mnt/data (Hetzner automount uses /mnt/HC_Volume_*)
  # Volume is attached via Terraform automount=true.
  # Symlink for a consistent path:
  - mkdir -p /mnt/data
  - |
    VOLUME_DEV=$(blkid -t TYPE=ext4 -o device | grep -v sda | head -1)
    if [ -n "$VOLUME_DEV" ]; then
      mount "$VOLUME_DEV" /mnt/data || true
      echo "$VOLUME_DEV /mnt/data ext4 discard,nofail,defaults 0 0" >> /etc/fstab
    fi

  # Datenverzeichnisse anlegen
  - mkdir -p /mnt/data/postgres /mnt/data/backups

  # Start GlitchTip (error tracking) if compose file exists
  - |
    if [ -f /opt/smarthabit/compose.glitchtip.yaml ]; then
      cd /opt/smarthabit && docker compose -f compose.glitchtip.yaml up -d
    fi

  # Create Caddy log directory for fail2ban (UID 1001 = FrankenPHP non-root user)
  - mkdir -p /var/log/caddy && chown 1001:1001 /var/log/caddy

  # Enable and start fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # unattended-upgrades konfigurieren
  - dpkg-reconfigure -plow unattended-upgrades

# ── fail2ban + unattended-upgrades ────────────────────────────────────────────
write_files:
  # ── fail2ban: SSH brute-force jail ──────────────────────────────────────────
  - path: /etc/fail2ban/jail.d/sshd.conf
    content: |
      [sshd]
      enabled  = true
      port     = ssh
      filter   = sshd
      logpath  = /var/log/auth.log
      maxretry = 5
      bantime  = 3600
      findtime = 600

  # ── fail2ban: Caddy 404/405 scanner jail ────────────────────────────────────
  - path: /etc/fail2ban/jail.d/caddy-scanner.conf
    content: |
      [caddy-scanner]
      enabled  = true
      port     = http,https
      filter   = caddy-scanner
      logpath  = /var/log/caddy/access.log
      maxretry = 10
      bantime  = 86400
      findtime = 600

  # ── fail2ban: filter for Caddy JSON access logs ────────────────────────────
  - path: /etc/fail2ban/filter.d/caddy-scanner.conf
    content: |
      [Definition]
      # Caddy JSON log: {"request":{"client_ip":"1.2.3.4",...},"status":404,...}
      # client_ip resolves the real visitor via trusted_proxies (Cloudflare)
      failregex = ^\{.*"client_ip":\s*"<HOST>".*"status":\s*(?:404|405)\s*[,}]
      ignoreregex =

  - path: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}";
        "${distro_id}:${distro_codename}-security";
        "${distro_id}ESMApps:${distro_codename}-apps-security";
        "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
